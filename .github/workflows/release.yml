name: release

on:
  push:
    tags:
      - "v*"

env:
  QUICKTODO_APP_REPO: turastory/quicktodo
  QUICKTODO_TAP_REPO: turastory/homebrew-tap
  QUICKTODO_CASK_TOKEN: quicktodo
  QUICKTODO_APP_NAME: QuickTodo
  QUICKTODO_APP_DESC: Single-file Markdown todo panel for macOS

jobs:
  build-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x Scripts/build-app.sh Scripts/create-release-zip.sh Scripts/render-cask.sh
          Scripts/create-release-zip.sh "$VERSION" "$GITHUB_RUN_NUMBER"
          Scripts/render-cask.sh "$VERSION" "$(cat dist/QuickTodo.sha256)"

      - name: Publish tap cask
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x Scripts/publish-tap.sh
          Scripts/publish-tap.sh "$VERSION" "$(cat dist/QuickTodo.sha256)"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QuickTodo.zip
            dist/QuickTodo.sha256
            Homebrew/quicktodo.rb
