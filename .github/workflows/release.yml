name: release

on:
  push:
    tags:
      - "v*"

env:
  QUICKTODO_APP_REPO: turastory/quicktodo
  QUICKTODO_TAP_REPO: turastory/homebrew-tap
  QUICKTODO_CASK_TOKEN: quicktodo
  QUICKTODO_APP_NAME: QuickTodo
  QUICKTODO_MIN_MACOS: ventura

jobs:
  build-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x Scripts/release-common.sh Scripts/build-app.sh Scripts/create-release-zip.sh
          Scripts/create-release-zip.sh "$VERSION" "$GITHUB_RUN_NUMBER"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QuickTodo.zip
            dist/QuickTodo.sha256

      - name: Dispatch tap cask update
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x Scripts/release-common.sh Scripts/dispatch-tap-update.sh
          Scripts/dispatch-tap-update.sh "$VERSION" "$(cat dist/QuickTodo.sha256)" "$GITHUB_REF_NAME"
